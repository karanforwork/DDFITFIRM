<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เกมอาหาร 3 สี</title>

<style>

body{
font-family: Arial;
text-align:center;
background:linear-gradient(135deg,#dfefff,#ffffff);
}

h1{
font-size:40px;
}

video{
width:260px;
border-radius:15px;
margin:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

#food{
font-size:80px;
margin:20px;
animation:pop 0.5s;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

button{
font-size:20px;
padding:15px 25px;
margin:10px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
}

.green{background:#2ecc71;color:white;}
.yellow{background:#f1c40f;}
.red{background:#e74c3c;color:white;}

#score,#timer,#level{
font-size:22px;
margin:10px;
}

#leaderboard{
margin-top:30px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #ccc;
padding:8px 15px;
}

.correct{
animation:flashGreen 0.5s;
}

.wrong{
animation:flashRed 0.5s;
}

@keyframes flashGreen{
0%{background:#2ecc71}
100%{background:none}
}

@keyframes flashRed{
0%{background:#e74c3c}
100%{background:none}
}

</style>
</head>

<body>

<h1>🥦 เกมอาหาร 3 สี 🥦</h1>

<input id="playerName" placeholder="พิมพ์ชื่อผู้เล่น">

<br><br>

<button onclick="startGame()">เริ่มเกม</button>

<br>

<video id="camera" autoplay></video>

<div id="food">🍎</div>

<div>

<button class="green" onclick="answer('green')">🟢 กินได้บ่อย</button>

<button class="yellow" onclick="answer('yellow')">🟡 กินพอดี</button>

<button class="red" onclick="answer('red')">🔴 กินแต่น้อย</button>

</div>

<div id="score">คะแนน: 0</div>
<div id="timer">เวลา: 60</div>
<div id="level">ด่าน: 1</div>

<div id="leaderboard">

<h2>🏆 Leaderboard ห้องเรียน</h2>

<table>
<thead>
<tr>
<th>ชื่อ</th>
<th>คะแนน</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

</div>

<script>

let score=0
let level=1
let time=60
let timer
let currentFood

const correctSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")
const wrongSound=new Audio("https://actions.google.com/sounds/v1/cartoon/boing.ogg")

const foods=[

{emoji:"🥦",type:"green"},
{emoji:"🥕",type:"green"},
{emoji:"🍎",type:"green"},
{emoji:"🍌",type:"green"},

{emoji:"🍚",type:"yellow"},
{emoji:"🍗",type:"yellow"},
{emoji:"🥚",type:"yellow"},
{emoji:"🍜",type:"yellow"},

{emoji:"🍟",type:"red"},
{emoji:"🍔",type:"red"},
{emoji:"🍩",type:"red"},
{emoji:"🍫",type:"red"}

]

function startGame(){

score=0
level=1
time=60

nextFood()

timer=setInterval(()=>{

time--

document.getElementById("timer").innerHTML="เวลา: "+time

if(time<=0){

endGame()

}

},1000)

}

function nextFood(){

currentFood=foods[Math.floor(Math.random()*foods.length)]

document.getElementById("food").innerHTML=currentFood.emoji

}

function answer(color){

if(time<=0)return

if(color==currentFood.type){

score+=10

correctSound.play()

document.body.classList.add("correct")

}else{

wrongSound.play()

document.body.classList.add("wrong")

}

document.getElementById("score").innerHTML="คะแนน: "+score

if(score>50)level=2
if(score>100)level=3

document.getElementById("level").innerHTML="ด่าน: "+level

setTimeout(()=>{
document.body.classList.remove("correct")
document.body.classList.remove("wrong")
},300)

nextFood()

}

function endGame(){

clearInterval(timer)

alert("หมดเวลา! คะแนน: "+score)

saveScore()

loadBoard()

}

function saveScore(){

let name=document.getElementById("playerName").value

let board=JSON.parse(localStorage.getItem("foodgame"))||[]

board.push({name,score})

board.sort((a,b)=>b.score-a.score)

board=board.slice(0,10)

localStorage.setItem("foodgame",JSON.stringify(board))

}

function loadBoard(){

let board=JSON.parse(localStorage.getItem("foodgame"))||[]

let html=""

board.forEach(p=>{

html+=`<tr><td>${p.name}</td><td>${p.score}</td></tr>`

})

document.getElementById("board").innerHTML=html

}

loadBoard()

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
document.getElementById("camera").srcObject=stream
})

</script>

</body>
</html>
