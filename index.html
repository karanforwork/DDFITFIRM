<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>DD DON FOOD HERO</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#a8e6cf,#ffffff);
}

h1{
font-size:40px;
}

#food{
font-size:100px;
margin:20px;
}

#timer{
font-size:30px;
}

button{
font-size:25px;
padding:15px 30px;
margin:10px;
border-radius:10px;
border:none;
cursor:pointer;
}

.green{background:#2ecc71;color:white}
.yellow{background:#f1c40f}
.red{background:#e74c3c;color:white}

#leaderboard{
margin-top:20px;
font-size:20px;
}

</style>

</head>

<body>

<h1>🥦 DD DON FOOD HERO</h1>

<div id="timer">เวลา 60</div>

<div id="food">🍛</div>

<div>

<button class="green" onclick="answer('green')">
🟢 กินบ่อย
</button>

<button class="yellow" onclick="answer('yellow')">
🟡 พอดี
</button>

<button class="red" onclick="answer('red')">
🔴 น้อย
</button>

</div>

<h2 id="score">คะแนน 0</h2>

<div id="leaderboard">

<h3>🏆 Leaderboard ห้องเรียน</h3>

<ol id="board"></ol>

</div>

<audio id="correctSound"
src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>

<audio id="wrongSound"
src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>

<script>

let score=0
let time=60

const foods=[

{name:"ต้มยำกุ้ง",emoji:"🍤",type:"green"},
{name:"ส้มตำ",emoji:"🥗",type:"green"},
{name:"แกงจืด",emoji:"🍲",type:"green"},
{name:"ผัดผัก",emoji:"🥦",type:"green"},
{name:"ปลาเผา",emoji:"🐟",type:"green"},

{name:"ข้าวผัด",emoji:"🍚",type:"yellow"},
{name:"ก๋วยเตี๋ยว",emoji:"🍜",type:"yellow"},
{name:"ไข่เจียว",emoji:"🍳",type:"yellow"},
{name:"ข้าวมันไก่",emoji:"🍗",type:"yellow"},
{name:"ผัดไทย",emoji:"🍝",type:"yellow"},

{name:"หมูกรอบ",emoji:"🥓",type:"red"},
{name:"ไก่ทอด",emoji:"🍗",type:"red"},
{name:"เฟรนช์ฟรายส์",emoji:"🍟",type:"red"},
{name:"โดนัท",emoji:"🍩",type:"red"},
{name:"เบอร์เกอร์",emoji:"🍔",type:"red"}

]

let current

function newFood(){

current=foods[Math.floor(Math.random()*foods.length)]

document.getElementById("food").innerHTML=current.emoji

}

function answer(color){

if(color==current.type){

score+=10

document.getElementById("correctSound").play()

}else{

document.getElementById("wrongSound").play()

}

document.getElementById("score").innerHTML="คะแนน "+score

newFood()

}

setInterval(()=>{

time--

document.getElementById("timer").innerHTML="เวลา "+time

if(time<=0){

endGame()

}

},1000)

function endGame(){

let name=prompt("ใส่ชื่อทีม")

let data=JSON.parse(localStorage.getItem("scores")||"[]")

data.push({name:name,score:score})

data.sort((a,b)=>b.score-a.score)

localStorage.setItem("scores",JSON.stringify(data))

showBoard()

}

function showBoard(){

let data=JSON.parse(localStorage.getItem("scores")||"[]")

let html=""

data.slice(0,5).forEach(s=>{

html+=`<li>${s.name} - ${s.score}</li>`

})

document.getElementById("board").innerHTML=html

}

newFood()
showBoard()

</script>

</body>
</html>
